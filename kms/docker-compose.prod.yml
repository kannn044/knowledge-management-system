version: '3.9'

# Production override — use with:
# docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    restart: always

  chromadb:
    restart: always
    ports: []  # Do not expose ChromaDB externally in production

  redis:
    restart: always
    ports: []  # Do not expose Redis externally in production

  python-service:
    restart: always
    ports: []  # Internal only; accessed via backend

  backend:
    build:
      target: production
    restart: always
    environment:
      NODE_ENV: production
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads
    command: node dist/app.js

  frontend:
    build:
      target: production
    restart: always
    ports: []  # Served by Nginx

  # ─── Nginx Reverse Proxy (production only) ────────────────────────
  nginx:
    image: nginx:alpine
    container_name: kms_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  chroma_data:
  redis_data:
  uploads_data:
  nginx_logs:
